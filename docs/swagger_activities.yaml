openapi: 3.0.3
info:
  title: Sweatly Activities & Feed API
  description: API specifications for Sweatly's Activity CRUD, RSVPs, Community Feed, Comments (including nested replies), and Likes.
  version: 1.0.0
security:
  - BearerAuth: []
paths:
  /api/v1/activities:
    post:
      summary: Create a new sports activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityCreateRequest'
      responses:
        '201':
          description: Activity created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '400':
          $ref: '#/components/responses/400ValidationError'
        '401':
          $ref: '#/components/responses/401Unauthorized'
    get:
      summary: List activities with filters, sorting, and pagination
      parameters:
        - name: sportId
          in: query
          schema:
            type: string
        - name: activityType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [open, full, cancelled, completed]
        - name: hostId
          in: query
          schema:
            type: string
        - name: query
          in: query
          schema:
            type: string
          description: Search term matching title, description, or address.
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of activities retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityResponse'

  /api/v1/activities/{id}:
    get:
      summary: Retrieve activity details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Activity details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'
        '404':
          description: Activity not found.
    patch:
      summary: Update activity details (requires host ownership)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityUpdateRequest'
      responses:
        '200':
          description: Activity updated successfully.
        '403':
          description: Forbidden. Requester is not the host.
    delete:
      summary: Delete activity (requires host ownership)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Activity deleted successfully.

  /api/v1/activities/{id}/join:
    post:
      summary: RSVP / Join activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully joined activity.

  /api/v1/activities/{id}/leave:
    post:
      summary: Cancel RSVP / Leave activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully left activity.

  /api/v1/activities/media:
    post:
      summary: Upload workout photos / activity images
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                media:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Array of up to 5 image files (Max 5MB each).
      responses:
        '200':
          description: Photos uploaded successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  urls:
                    type: array
                    items:
                      type: string
                      example: /uploads/avatars/172000000-workout.png

  /api/v1/feed:
    get:
      summary: Retrieve ranked activity feed (cursor-paginated)
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          description: ISO string timestamp of the last item in previous page.
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: sportId
          in: query
          schema:
            type: string
        - name: lon
          in: query
          schema:
            type: number
        - name: lat
          in: query
          schema:
            type: number
        - name: radius
          in: query
          schema:
            type: number
          description: Proximity search radius in meters.
      responses:
        '200':
          description: Paginated feed data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityResponse'
                  nextCursor:
                    type: string
                    nullable: true

  /api/v1/comments:
    post:
      summary: Post a comment or reply to an activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreateRequest'
      responses:
        '201':
          description: Comment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'

  /api/v1/comments/{id}:
    patch:
      summary: Edit a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Comment updated.
    delete:
      summary: Delete a comment (requires author ownership)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Comment deleted.

  /api/v1/comments/activity/{activityId}:
    get:
      summary: Get top-level comments for an activity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of comments.

  /api/v1/comments/{id}/replies:
    get:
      summary: Get nested replies to a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of nested comment replies.

  /api/v1/likes/{activityId}:
    post:
      summary: Like an activity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Activity liked.
    delete:
      summary: Unlike an activity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Activity unliked.

  /api/v1/likes/{activityId}/status:
    get:
      summary: Get user like status
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  hasLiked:
                    type: boolean

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    400ValidationError:
      description: Input validation error.
    401Unauthorized:
      description: Unauthorized.

  schemas:
    ActivityResponse:
      type: object
      properties:
        _id:
          type: string
        hostId:
          type: string
        title:
          type: string
        sportId:
          type: string
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        location:
          type: object
          properties:
            type:
              type: string
            coordinates:
              type: array
              items:
                type: number
        address:
          type: string
        maxCapacity:
          type: integer
        status:
          type: string
        activityType:
          type: string
        duration:
          type: integer
        distance:
          type: number
        calories:
          type: number
        visibility:
          type: string
        media:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        likesCount:
          type: integer
        commentsCount:
          type: integer

    ActivityCreateRequest:
      type: object
      required: [title, sportId, startTime, endTime, location, address, activityType, duration]
      properties:
        title:
          type: string
        sportId:
          type: string
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        location:
          type: object
          required: [coordinates]
          properties:
            coordinates:
              type: array
              items:
                type: number
        address:
          type: string
        maxCapacity:
          type: integer
        activityType:
          type: string
        duration:
          type: integer
        distance:
          type: number
        calories:
          type: number
        visibility:
          type: string
          enum: [public, private, friends]
        media:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    ActivityUpdateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        address:
          type: string
        maxCapacity:
          type: integer
        activityType:
          type: string
        duration:
          type: integer
        distance:
          type: number
        calories:
          type: number
        visibility:
          type: string
        completionStatus:
          type: string
          enum: [pending, completed, cancelled]

    CommentCreateRequest:
      type: object
      required: [activityId, content]
      properties:
        activityId:
          type: string
        content:
          type: string
        parentId:
          type: string
          nullable: true

    CommentResponse:
      type: object
      properties:
        _id:
          type: string
        activityId:
          type: string
        userId:
          type: string
        content:
          type: string
        parentId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
