version: '3.8'

services:
  database:
    image: mongo:6.0
    container_name: sweatly-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sweatly
    volumes:
      - sweatly-db-data:/data/db
    networks:
      - sweatly-network

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: sweatly-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://database:27017/sweatly
      - NODE_ENV=production
    depends_on:
      - database
    networks:
      - sweatly-network

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    container_name: sweatly-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - sweatly-network

  nginx:
    image: nginx:1.25-alpine
    container_name: sweatly-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - server
    networks:
      - sweatly-network

volumes:
  sweatly-db-data:

networks:
  sweatly-network:
    driver: bridge
